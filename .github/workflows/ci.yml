name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test --enable-code-coverage

  thread-sanitizer:
    name: Thread Sanitizer
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Concurrency tests under TSan
        run: swift test --sanitize=thread --filter "FlowCorrelator|ConnectionAggregator"

  lint:
    name: Lint & Format
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        run: brew install swiftlint swiftformat
      - name: SwiftLint (strict, warnings are errors)
        run: swiftlint lint --strict
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .
      - name: Localization coverage (every string in all languages)
        run: python3 scripts/check-localizations.py
