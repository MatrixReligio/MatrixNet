name: Update GeoIP database

# DB-IP publishes the Country Lite dataset (CC-BY-4.0) monthly. This job rebuilds
# the compact geoip.dat and republishes it as the stable `geoip-latest` release
# asset, which the app downloads in the background. Runs on the 3rd of each month
# (after DB-IP's monthly drop) and on demand.
on:
  schedule:
    - cron: "0 6 3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Build and publish geoip.dat
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build geoip.dat from the latest DB-IP dataset
        run: |
          set -euo pipefail
          # Try the current month, fall back to the previous one if not yet up.
          if ! ./scripts/build-geoip.sh "$(date +%Y-%m)"; then
            ./scripts/build-geoip.sh "$(date -v-1m +%Y-%m)"
          fi
          ls -la App/Resources/geoip.dat

      - name: Fetch Sparkle tools (sign_update)
        env:
          SPARKLE_VERSION: "2.9.3"
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle && tar -xf sparkle.tar.xz -C sparkle
          echo "SPARKLE_BIN=$RUNNER_TEMP/sparkle/bin" >> "$GITHUB_ENV"

      - name: Sign geoip.dat (Ed25519, for the app's signature check)
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEYFILE="$(mktemp)"
          trap 'rm -f "$KEYFILE"' EXIT
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEYFILE"
          # -p prints only the base64 EdDSA signature; the app verifies it with
          # CryptoKit against the embedded SUPublicEDKey before installing.
          "$SPARKLE_BIN/sign_update" -p App/Resources/geoip.dat --ed-key-file "$KEYFILE" \
            > App/Resources/geoip.dat.edsig
          test -s App/Resources/geoip.dat.edsig

      - name: Publish to the geoip-latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: geoip-latest
          name: GeoIP database (rolling)
          body: |
            Rolling GeoIP database for MatrixNet's in-app auto-update.

            IP Geolocation by DB-IP (https://db-ip.com), licensed under CC-BY-4.0.
            Rebuilt automatically from the latest DB-IP Country Lite dataset.
            `geoip.dat.edsig` is an Ed25519 signature the app verifies before install.
          files: |
            App/Resources/geoip.dat
            App/Resources/geoip.dat.edsig
          make_latest: false
