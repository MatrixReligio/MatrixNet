name: Bug report
description: Report a problem with MatrixNet
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open MatrixNet
        2. ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "26.0"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MatrixNet version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Network environment
      description: Any VPN, proxy, or filtering software running (AdGuard, Surge, Little Snitch, etc.)?
