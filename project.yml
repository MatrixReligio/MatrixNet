name: MatrixNet

options:
  bundleIdPrefix: com.matrixreligio
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

packages:
  MatrixNetCore:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"

settings:
  base:
    DEVELOPMENT_TEAM: 4DUQGD879H
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.22"
    CURRENT_PROJECT_VERSION: "23"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"

targets:
  MatrixNet:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: MatrixNetCore
        product: MatrixNetModel
      - package: MatrixNetCore
        product: MatrixNetCapture
      - package: MatrixNetCore
        product: MatrixNetDissection
      - package: MatrixNetCore
        product: MatrixNetPcap
      - package: MatrixNetCore
        product: MatrixNetXPC
      - package: MatrixNetCore
        product: MatrixNetStore
      - package: MatrixNetCore
        product: MatrixNetGeoIP
      - package: MatrixNetCore
        product: MatrixNetThreat
      - package: MatrixNetCore
        product: MatrixNetMap
      - package: Sparkle
        product: Sparkle
      - target: MatrixNetWidget
        embed: true
      - target: MatrixNetHelper
        embed: true
        copy:
          destination: executables
    postBuildScripts:
      - name: Embed SMAppService daemon plist
        script: |
          DEST="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchDaemons"
          mkdir -p "$DEST"
          cp "$SRCROOT/Helper/com.matrixreligio.matrixnet.helper.plist" "$DEST/"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matrixreligio.matrixnet
        PRODUCT_NAME: MatrixNet
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: App/MatrixNet.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 MatrixReligio LLC. Licensed under Apache-2.0."
        INFOPLIST_KEY_CFBundleDisplayName: MatrixNet
        INFOPLIST_KEY_LSUIElement: NO
    info:
      path: App/MatrixNet-Info.plist
      properties:
        CFBundleShortVersionString: "0.1.22"
        CFBundleVersion: "23"
        LSMinimumSystemVersion: "26.0"
        CFBundleLocalizations: [en, zh-Hans, zh-Hant, ja, ko, fr, de, es]
        # Sparkle auto-update. Appcast is published as a stable GitHub "latest
        # release" asset; the EdDSA public key verifies every downloaded update.
        SUFeedURL: "https://github.com/MatrixReligio/MatrixNet/releases/latest/download/appcast.xml"
        SUPublicEDKey: "EGUIhgXktQ0/urKDPSDzDlpb5Yowa/43aJSUdTsacoQ="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400

  MatrixNetHelper:
    type: tool
    platform: macOS
    sources:
      - path: Helper/Sources
    dependencies:
      - package: MatrixNetCore
        product: MatrixNetModel
      - package: MatrixNetCore
        product: MatrixNetCapture
      - package: MatrixNetCore
        product: MatrixNetXPC
    settings:
      base:
        PRODUCT_NAME: MatrixNetHelper
        PRODUCT_BUNDLE_IDENTIFIER: com.matrixreligio.matrixnet.helper
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  MatrixNetWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget/Sources
      - path: Widget/Resources
    dependencies:
      - package: MatrixNetCore
        product: MatrixNetModel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matrixreligio.matrixnet.widget
        PRODUCT_NAME: MatrixNetWidget
        CODE_SIGN_ENTITLEMENTS: Widget/MatrixNetWidget.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: MatrixNet
        SKIP_INSTALL: YES
    info:
      path: Widget/MatrixNetWidget-Info.plist
      properties:
        CFBundleShortVersionString: "0.1.22"
        CFBundleVersion: "23"
        CFBundleLocalizations: [en, zh-Hans, zh-Hant, ja, ko, fr, de, es]
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
